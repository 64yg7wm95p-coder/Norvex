<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Norvex Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f7f5f0, #ebecee);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.08);
            border: 1px solid #e2e4e8;
        }

        .brand {
            font-weight: 800;
            color: #2d3138;
            letter-spacing: 1px;
        }

        .btn-norvex {
            background: linear-gradient(135deg, #cbb596, #b29771);
            color: #fff;
            border: none;
        }

        .btn-norvex:hover {
            background: linear-gradient(135deg, #b29771, #987d57);
            color: #fff;
        }

        .error-box {
            background: #fff3f3;
            color: #b42318;
            border: 1px solid #f5c2c7;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h1 class="brand mb-1">NORVEX</h1>
            <p class="text-muted mb-0">AI Commerce & Fulfilment Platform</p>
        </div>

        {% if error %}
        <div class="error-box mb-3">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label fw-semibold">Kullanıcı adı</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Şifre</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-norvex w-100 fw-bold py-2">
                Giriş Yap
            </button>
        </form>

        <div class="text-center mt-4 small text-muted">
            Demo hesap: <strong>taner5 / 123456</strong>
        </div>
    </div>
</body>
</html>
